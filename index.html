<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <h1 class="title">Contador</h1>
    <p class="subtitle">Incrementa o disminuye el valor</p>
    <p id="counter" class="counter">0</p>
    <div class="actions">
      <button type="button" id="btn-decrement" class="btn btn-decrement">Decrementar</button>
      <button type="button" id="btn-increment" class="btn btn-increment">Incrementar</button>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
